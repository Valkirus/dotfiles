# ==========================================
# TMUX CONFIGURATION
# ==========================================

# 1. Fix the escape sequence bleed over SSH
# This gives tmux a tiny window (50ms) to properly catch the terminal handshake
set -s escape-time 50

# 2. Ensure true color support works through Windows Terminal
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# 3. Enable mouse support (helpful for scrolling in the container)
set -g mouse on
